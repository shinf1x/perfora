name: Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary (LTO profile)
        run: cargo build --locked --profile release-lto --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          BIN_NAME="perfora"
          TARGET_DIR="target/${{ matrix.target }}/release-lto"
          VERSION="${{ github.event.release.tag_name || github.ref_name }}"
          ARCHIVE_NAME="perfora-${VERSION}-${{ matrix.target }}.tar.gz"
          mkdir -p dist/package
          cp "${TARGET_DIR}/${BIN_NAME}" dist/package/
          chmod +x "dist/package/${BIN_NAME}"
          tar -czf "dist/${ARCHIVE_NAME}" -C dist/package "${BIN_NAME}"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.target }}
          path: dist/*.tar.gz

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
